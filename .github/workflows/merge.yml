name: CI Check
on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  ci-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Prettier check
        run: bun prettier --check .
